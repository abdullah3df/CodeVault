<style>
/* ══════════════════════════════════════════
   DESIGN SYSTEM
══════════════════════════════════════════ */
:root {
  --void:      #04050a;
  --base:      #080b12;
  --layer1:    #0d111c;
  --layer2:    #111827;
  --layer3:    #1a2235;
  --rim:       rgba(255,255,255,.06);
  --rim2:      rgba(255,255,255,.03);

  --cyan:      #00f5d4;
  --cyan-dim:  rgba(0,245,212,.12);
  --cyan-glow: rgba(0,245,212,.25);
  --violet:    #a78bfa;
  --violet-dim:rgba(167,139,250,.12);
  --amber:     #fbbf24;
  --rose:      #fb7185;
  --emerald:   #34d399;

  --text:      #c8d3e8;
  --text-soft: #6b7fa3;
  --text-faint:#2e3a52;
  --white:     #f0f4ff;

  /* syntax */
  --s-kw:  #c084fc;
  --s-str: #86efac;
  --s-cm:  #475569;
  --s-num: #f9a8d4;
  --s-fn:  #67e8f9;
  --s-op:  #fca5a5;
  --s-tp:  #7dd3fc;
  --s-tg:  #fb923c;
  --s-at:  #a3e635;
  --s-vl:  #fde68a;

  --r: 14px;
  --r-sm: 8px;
  --r-lg: 20px;
}

/* ── Reset ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Cairo', sans-serif;
  background: var(--void);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  cursor: default;
}

/* ── Animated background ── */
.bg-canvas {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  overflow: hidden;
}
.bg-orb {
  position: absolute; border-radius: 50%;
  filter: blur(120px); opacity: .35;
  animation: drift 20s ease-in-out infinite alternate;
}
.orb-1 {
  width: 700px; height: 700px;
  background: radial-gradient(circle, rgba(0,245,212,.18), transparent 70%);
  top: -200px; right: -200px;
  animation-delay: 0s;
}
.orb-2 {
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(167,139,250,.15), transparent 70%);
  bottom: -100px; left: -100px;
  animation-delay: -8s;
}
.orb-3 {
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(251,191,36,.1), transparent 70%);
  top: 50%; left: 40%;
  animation-delay: -14s;
}
@keyframes drift {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(40px, 30px) scale(1.08); }
}

/* Fine grid */
.bg-canvas::after {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.015) 1px, transparent 1px);
  background-size: 48px 48px;
}

/* ── Layout ── */
.app { position: relative; z-index: 1; }

/* ═══════════════════ NAVBAR ═══════════════════ */
nav {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 40px;
  height: 64px;
  background: rgba(8,11,18,.7);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border-bottom: 1px solid var(--rim);
  animation: slideDown .6s ease;
}
@keyframes slideDown {
  from { transform: translateY(-100%); opacity: 0; }
  to   { transform: translateY(0);     opacity: 1; }
}

.nav-brand {
  display: flex; align-items: center; gap: 12px;
}
.brand-mark {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--cyan) 0%, #00b4d8 100%);
  border-radius: 10px;
  display: grid; place-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px; font-weight: 600; color: #04050a;
  box-shadow: 0 0 20px var(--cyan-glow), 0 0 0 1px rgba(0,245,212,.2);
  position: relative;
}
.brand-mark::after {
  content: '';
  position: absolute; inset: -4px;
  border-radius: 14px;
  border: 1px solid rgba(0,245,212,.15);
  animation: pulse-ring 3s ease-in-out infinite;
}
@keyframes pulse-ring {
  0%,100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0; transform: scale(1.3); }
}

.brand-name {
  font-family: 'Syne', sans-serif;
  font-size: 18px; font-weight: 800;
  color: var(--white);
  letter-spacing: -.5px;
}
.brand-name span { color: var(--cyan); }

.nav-chips { display: flex; gap: 8px; }
.chip {
  padding: 4px 12px; border-radius: 20px;
  font-size: 11px; font-weight: 600; letter-spacing: .8px; text-transform: uppercase;
  border: 1px solid;
}
.chip-cyan   { color: var(--cyan);   border-color: rgba(0,245,212,.25);   background: rgba(0,245,212,.06);   }
.chip-violet { color: var(--violet); border-color: rgba(167,139,250,.25); background: rgba(167,139,250,.06); }

/* ═══════════════════ MAIN ═══════════════════ */
.main { max-width: 1160px; margin: 0 auto; padding: 48px 24px 100px; }

/* ── Section title ── */
.section-label {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 20px;
}
.section-label::before {
  content: '';
  display: block; width: 3px; height: 18px;
  background: linear-gradient(180deg, var(--cyan), var(--violet));
  border-radius: 2px;
}
.section-label span {
  font-family: 'Syne', sans-serif;
  font-size: 11px; font-weight: 700;
  color: var(--text-soft); letter-spacing: 2px; text-transform: uppercase;
}

/* ── Glass card ── */
.glass {
  background: rgba(13,17,28,.8);
  border: 1px solid var(--rim);
  border-radius: var(--r-lg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.glass-inner {
  background: var(--rim2);
  border: 1px solid var(--rim);
  border-radius: var(--r);
}

/* ═══════════════════ TOOLBAR ═══════════════════ */
.toolbar {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 28px; flex-wrap: wrap;
}
.lang-pills {
  display: flex; gap: 6px; flex-wrap: wrap; flex: 1;
}
.pill {
  padding: 6px 16px; border-radius: 30px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 600; letter-spacing: .5px;
  border: 1px solid var(--rim); background: var(--layer1);
  color: var(--text-soft); cursor: pointer;
  transition: all .22s cubic-bezier(.4,0,.2,1);
  position: relative; overflow: hidden;
}
.pill::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--cyan-dim), var(--violet-dim));
  opacity: 0; transition: opacity .22s;
}
.pill:hover { color: var(--white); border-color: var(--rim2); transform: translateY(-1px); }
.pill:hover::before { opacity: 1; }
.pill.active {
  color: var(--cyan); border-color: rgba(0,245,212,.35);
  background: var(--cyan-dim);
  box-shadow: 0 0 16px rgba(0,245,212,.1);
}
.pill.active::before { opacity: 0; }

.btn {
  padding: 9px 22px; border-radius: 10px; border: none; cursor: pointer;
  font-family: 'Cairo', sans-serif; font-size: 14px; font-weight: 700;
  transition: all .22s cubic-bezier(.4,0,.2,1);
  white-space: nowrap;
}
.btn-ghost {
  background: var(--layer2); color: var(--text-soft);
  border: 1px solid var(--rim);
}
.btn-ghost:hover { color: var(--white); border-color: rgba(255,255,255,.12); transform: translateY(-1px); }
.btn-primary {
  background: linear-gradient(135deg, var(--cyan) 0%, #00b4d8 100%);
  color: #04050a;
  box-shadow: 0 4px 20px var(--cyan-glow);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,245,212,.35); }
.btn-primary:active { transform: translateY(0); }

/* ═══════════════════ INPUT AREA ═══════════════════ */
.input-card {
  padding: 1px; /* border trick */
  border-radius: var(--r-lg);
  background: linear-gradient(135deg, rgba(0,245,212,.15), rgba(167,139,250,.1), rgba(13,17,28,0));
  margin-bottom: 28px;
  animation: fadeUp .5s .1s both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}

.input-inner {
  background: var(--layer1);
  border-radius: calc(var(--r-lg) - 1px);
  overflow: hidden;
}

.editor-chrome {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px;
  background: var(--layer2);
  border-bottom: 1px solid var(--rim);
}
.chrome-dots { display: flex; gap: 8px; }
.dot { width: 12px; height: 12px; border-radius: 50%; }
.dot-r { background: #ff5f57; box-shadow: 0 0 8px rgba(255,95,87,.5); }
.dot-y { background: #ffbd2e; box-shadow: 0 0 8px rgba(255,189,46,.5); }
.dot-g { background: #28c840; box-shadow: 0 0 8px rgba(40,200,64,.5); }

.chrome-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; color: var(--text-soft);
  display: flex; align-items: center; gap: 8px;
}
.chrome-title .dot-indicator {
  width: 6px; height: 6px; border-radius: 50%; background: var(--cyan);
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.2; } }

.chrome-actions { display: flex; gap: 4px; }
.icon-btn {
  width: 32px; height: 32px; border-radius: 8px; border: none;
  background: none; color: var(--text-soft); cursor: pointer; font-size: 14px;
  display: grid; place-items: center;
  transition: all .18s;
}
.icon-btn:hover { background: var(--rim); color: var(--white); }

textarea#code {
  width: 100%; min-height: 260px;
  background: transparent; border: none; outline: none;
  resize: vertical;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px; line-height: 1.75;
  padding: 24px;
  tab-size: 2; direction: ltr; text-align: left;
  caret-color: var(--cyan);
}
textarea#code::placeholder { color: var(--text-faint); }
textarea#code::selection { background: rgba(0,245,212,.18); }

/* ═══════════════════ IMAGE ZONE ═══════════════════ */
.image-zone {
  border: 1.5px dashed rgba(167,139,250,.25);
  border-radius: var(--r);
  padding: 24px;
  cursor: pointer;
  transition: all .25s;
  background: var(--violet-dim);
  text-align: center;
  margin-bottom: 28px;
  animation: fadeUp .5s .2s both;
}
.image-zone:hover, .image-zone.dragover {
  border-color: var(--violet);
  background: rgba(167,139,250,.15);
  transform: scale(1.005);
}
.image-zone-icon { font-size: 32px; margin-bottom: 8px; }
.image-zone-text { font-size: 14px; color: var(--text-soft); }
.image-zone-text strong { color: var(--violet); }
.image-zone-sub { font-size: 12px; color: var(--text-faint); margin-top: 4px; }
#imgInput { display: none; }

/* ── Image preview grid ── */
.image-gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 28px;
}
.img-card {
  position: relative; border-radius: var(--r); overflow: hidden;
  aspect-ratio: 4/3;
  border: 1px solid var(--rim);
  background: var(--layer2);
  animation: popIn .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn {
  from { opacity:0; transform: scale(.85); }
  to   { opacity:1; transform: scale(1); }
}
.img-card img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform .4s ease;
}
.img-card:hover img { transform: scale(1.06); }
.img-card .img-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(4,5,10,.8), transparent);
  opacity: 0; transition: opacity .25s;
  display: flex; align-items: flex-end; padding: 10px;
  gap: 6px;
}
.img-card:hover .img-overlay { opacity: 1; }
.img-name {
  font-size: 11px; color: rgba(255,255,255,.8);
  flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.img-delete {
  width: 24px; height: 24px; border-radius: 6px;
  background: rgba(251,113,133,.2); border: none; cursor: pointer;
  color: var(--rose); font-size: 12px;
  display: grid; place-items: center;
  transition: background .18s;
}
.img-delete:hover { background: rgba(251,113,133,.4); }

/* ── Lightbox ── */
.lightbox {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(4,5,10,.92);
  backdrop-filter: blur(20px);
  display: none; place-items: center;
  cursor: zoom-out;
}
.lightbox.open { display: grid; animation: fadeIn .2s; }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
.lightbox img {
  max-width: 90vw; max-height: 90vh;
  border-radius: var(--r);
  box-shadow: 0 0 80px rgba(0,0,0,.8);
  border: 1px solid var(--rim);
  cursor: default;
}
.lb-close {
  position: absolute; top: 24px; right: 24px;
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--layer3); border: 1px solid var(--rim);
  color: var(--text); font-size: 18px; cursor: pointer;
  display: grid; place-items: center;
  transition: all .2s;
}
.lb-close:hover { background: var(--rose); color: #fff; }

/* ═══════════════════ OUTPUT ═══════════════════ */
.output-section { display: none; }
.output-section.on {
  display: block;
  animation: fadeUp .4s ease;
}

/* ── Search ── */
.search-row {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 20px;
}
.search-wrap {
  flex: 1;
  display: flex; align-items: center; gap: 10px;
  background: var(--layer1);
  border: 1px solid var(--rim);
  border-radius: 10px; padding: 0 16px;

.search-wrap:focus-within { border-color: rgba(0,245,212,.3); }
.search-icon { color: var(--text-soft); font-size: 13px; }
.search-wrap input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-family: 'JetBrains Mono', monospace;
  font-size: 13px; padding: 11px 0;
  direction: ltr; caret-color: var(--cyan);
}
.search-wrap input::placeholder { color: var(--text-faint); }
.match-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--cyan);
  background: var(--cyan-dim);
  padding: 2px 8px; border-radius: 20px;
  white-space: nowrap;
}

/* ── Stats strip ── */
.stats-strip {
  display: flex; align-items: center; gap: 20px;
  margin-bottom: 16px; padding: 0 4px;
}

  display: flex; align-items: center; gap: 6px;

  font-size: 11px; color: var(--text-soft);
}

/* ── Syntax tokens ── */
.kw  { color: var(--s-kw); }
.str { color: var(--s-str); }
.cm  { color: var(--s-cm); font-style: italic; }
.num { color: var(--s-num); }

.op  { color: var(--s-op); }
.tp  { color: var(--s-tp); }

/* ═══════════════════ SCROLLBAR ═══════════════════ */

/* ═══════════════════ TOAST ═══════════════════ */

<script>

/* ═══════════════════════════════════════════
   LANGUAGE DETECTION
═══════════════════════════════════════════ */
function detect(code) {
  if (/^\s*\{[\s\S]*\}$|^\s*\[[\s\S]*\]$/.test(code.trim())) return 'json';
  if (/<(!DOCTYPE|html|head|body|div|span|section|script|style)/i.test(code)) return 'html';
  if (/(SELECT|INSERT|UPDATE|DELETE|CREATE TABLE|FROM|WHERE|JOIN)/i.test(code)&&!/</.test(code)) return 'sql';
  if (/(def |import |from |print\(|if __name__|class .+:|\bself\b)/.test(code)) return 'python';
  if (/(#include|std::|cout|cin|int main\(\)|namespace|template<)/.test(code)) return 'cpp';
  if (/(public class|@Override|System\.out\.|import java\.|public static)/.test(code)) return 'java';
  if (/(echo |if \[|then$|fi$|\bdo\b|\bdone\b|bin\/bash|bin\/sh)/.test(code)) return 'shell';
  if (/(@media|@keyframes|@import|:root\s*\{|var\(--)/.test(code)) return 'css';
  if (/(interface |type |: [A-Z][a-zA-Z]+|<[A-Z][a-zA-Z]+>|as [A-Z])/.test(code)) return 'typescript';
  return 'javascript';
}
const EXT = {javascript:'js',typescript:'ts',python:'py',html:'html',css:'css',json:'json',java:'java',sql:'sql',shell:'sh',cpp:'cpp'};

/* ═══════════════════════════════════════════
   HIGHLIGHTER ENGINE — Token-safe (strings first, then keywords)
   Runs both in Worker AND as fallback on main thread
═══════════════════════════════════════════ */
function makeHighlighters() {
  function esc(s){ return s.replace(/&/g,'&amp;').replace(/\x3c/g,'&lt;').replace(/>/g,'&gt;'); }

  // Phase-based tokenizer: protect → highlight → restore
  // Prevents keywords from matching inside strings/comments
  function tok(code, protect, pairs, restore) {
    var ph = [], result = code;
    protect.forEach(function(re){
      result = result.replace(re, function(m){
        var i = ph.length; ph.push(m); return '\x00'+i+'\x01';
      });
    });
    pairs.forEach(function(p){ result = result.replace(p[0], p[1]); });
    ph.forEach(function(orig, i){
      result = result.replace('\x00'+i+'\x01', restore(orig));
    });
    return result;
  }

  function hlJS(c) {
    return tok(esc(c),
      [/(\/\/[^\n]*)/g, /(\/\*[\s\S]*?\*\/)/g,
       /(`(?:[^`\\]|\\.)*`)/g, /("(?:[^"\\]|\\.)*")/g, /('(?:[^'\\]|\\.)*')/g],
      [
        [/\b(const|let|var|function|return|if|else|for|while|do|switch|case|break|continue|new|class|extends|import|export|default|from|of|in|typeof|instanceof|try|catch|finally|throw|async|await|yield|delete|void|this|super|null|undefined|true|false|static|get|set)\b/g,'<span class="kw">$1</span>'],
        [/\b(\d+\.?\d*([eE][+-]?\d+)?)\b/g,'<span class="num">$1</span>'],
        [/\b([A-Z][a-zA-Z0-9_]*)\b/g,'<span class="tp">$1</span>'],
        [/\b([a-zA-Z_$][a-zA-Z0-9_$]*)\s*(?=\()/g,'<span class="fn">$1</span>']
      ],
      function(o){ return (o.startsWith('//')||o.startsWith('/*')) ? '<span class="cm">'+o+'</span>' : '<span class="str">'+o+'</span>'; }
    );
  }
  function hlTS(c) {
    return hlJS(c).replace(/\b(interface|type|enum|namespace|declare|abstract|readonly|public|private|protected|implements|keyof|infer|never|unknown|any)\b/g,'<span class="kw">$1</span>');
  }
  function hlPY(c) {
    return tok(esc(c),
      [/("""[\s\S]*?"""|'''[\s\S]*?''')/g, /(#[^\n]*)/g,
       /("(?:[^"\\]|\\.)*")/g, /('(?:[^'\\]|\\.)*')/g],
      [
        [/\b(def|class|import|from|as|return|if|elif|else|for|while|in|not|and|or|is|pass|break|continue|raise|try|except|finally|with|lambda|yield|global|nonlocal|del|True|False|None|async|await)\b/g,'<span class="kw">$1</span>'],
        [/\b(@[a-zA-Z_]+)/g,'<span class="at">$1</span>'],
        [/\b(\d+\.?\d*)\b/g,'<span class="num">$1</span>'],
        [/\b([A-Z][a-zA-Z0-9_]*)\b/g,'<span class="tp">$1</span>'],
        [/\b([a-zA-Z_][a-zA-Z0-9_]*)\s*(?=\()/g,'<span class="fn">$1</span>']
      ],
      function(o){ return o.startsWith('#') ? '<span class="cm">'+o+'</span>' : '<span class="str">'+o+'</span>'; }
    );
  }
  function hlHTML(c) {
    return esc(c)
      .replace(/(&lt;!--[\s\S]*?--&gt;)/g,'<span class="cm">$1</span>')
      .replace(/(&lt;\/?)(a-zA-Z[\w-]*)/g,'<span class="op">$1</span><span class="tg">$2</span>')
      .replace(/([\w-]+)(=)("(?:[^"]*)")/g,'<span class="at">$1</span><span class="op">=</span><span class="vl">$3</span>')
      .replace(/(&gt;)/g,'<span class="op">$1</span>');
  }
  function hlCSS(c) {
    return tok(esc(c),
      [/(\/\*[\s\S]*?\*\/)/g],
      [
        [/(@[\w-]+[^{]*)/g,'<span class="kw">$1</span>'],
        [/\b([\w-]+)\s*(?=:)/g,'<span class="at">$1</span>'],
        [/:\s*([^;{}\n]+)/g,': <span class="vl">$1</span>'],
        [/(#[0-9a-fA-F]{3,8})\b/g,'<span class="num">$1</span>']
      ],
      function(o){ return '<span class="cm">'+o+'</span>'; }
    );
  }
  function hlJSON(c) {
    return esc(c)
      .replace(/("(?:[^"\\]|\\.)*")\s*(:)/g,'<span class="at">$1</span><span class="op">$2</span>')
      .replace(/:\s*("(?:[^"\\]|\\.)*")/g,function(m,s){return ': <span class="str">'+s+'</span>';})
      .replace(/\b(true|false|null)\b/g,'<span class="kw">$1</span>')
      .replace(/\b(-?\d+\.?\d*([eE][+-]?\d+)?)\b/g,'<span class="num">$1</span>');
  }
  function hlSQL(c) {
    return tok(esc(c),
      [/('(?:[^'\\]|\\.)*')/g, /(--[^\n]*)/g],
      [
        [/\b(SELECT|INSERT|UPDATE|DELETE|FROM|WHERE|JOIN|LEFT|RIGHT|INNER|OUTER|ON|CREATE|TABLE|DROP|ALTER|ADD|PRIMARY|KEY|NOT|NULL|DEFAULT|GROUP|ORDER|BY|HAVING|LIMIT|AND|OR|AS|DISTINCT|INTO|VALUES|SET|BEGIN|COMMIT|ROLLBACK|UNION|CASE|WHEN|THEN|END|IS|IN|LIKE|BETWEEN|EXISTS)\b/gi,'<span class="kw">$1</span>'],
        [/\b(\d+)\b/g,'<span class="num">$1</span>']
      ],
      function(o){ return o.startsWith('--') ? '<span class="cm">'+o+'</span>' : '<span class="str">'+o+'</span>'; }
    );
  }
  function hlSH(c) {
    return tok(esc(c),
      [/(#[^\n]*)/g, /("(?:[^"\\]|\\.)*")/g, /('[^']*')/g],
      [
        [/\b(if|then|else|elif|fi|for|do|done|while|case|esac|in|echo|exit|return|export|source|local|read|shift|set|unset|trap|eval|exec|cd|ls|grep|awk|sed|cat|touch|mkdir|rm|cp|mv|chmod|chown)\b/g,'<span class="kw">$1</span>'],
        [/(\$\{?[\w@#*?!0-9]+\}?)/g,'<span class="tp">$1</span>'],
        [/(&&|\|\||;|>>?|<<|&)/g,'<span class="op">$1</span>']
      ],
      function(o){ return o.startsWith('#') ? '<span class="cm">'+o+'</span>' : '<span class="str">'+o+'</span>'; }
    );
  }
  function hlCPP(c) {
    return tok(esc(c),
      [/(\/\/[^\n]*)/g, /(\/\*[\s\S]*?\*\/)/g, /(#[a-z]+[^\n]*)/g, /("(?:[^"\\]|\\.)*")/g],
      [
        [/\b(auto|break|case|catch|class|const|continue|default|delete|do|else|enum|explicit|extern|false|for|friend|if|inline|int|long|mutable|namespace|new|nullptr|operator|private|protected|public|return|short|signed|sizeof|static|struct|switch|template|this|throw|true|try|typedef|typename|union|unsigned|using|virtual|void|volatile|while|std|string|vector|map|cout|cin|endl)\b/g,'<span class="kw">$1</span>'],
        [/\b(\d+\.?\d*[fFlLuU]*)\b/g,'<span class="num">$1</span>'],
        [/\b([A-Z][a-zA-Z0-9_]*)\b/g,'<span class="tp">$1</span>'],
        [/\b([a-zA-Z_][a-zA-Z0-9_]*)\s*(?=\()/g,'<span class="fn">$1</span>']
      ],
      function(o){
        if(o.startsWith('//')||o.startsWith('/*')) return '<span class="cm">'+o+'</span>';
        if(o.startsWith('#')) return '<span class="at">'+o+'</span>';
        return '<span class="str">'+o+'</span>';
      }
    );
  }
  return {javascript:hlJS,typescript:hlTS,python:hlPY,html:hlHTML,css:hlCSS,json:hlJSON,sql:hlSQL,shell:hlSH,cpp:hlCPP,java:hlJS};
}

/* ═══════════════════════════════════════════
   WEB WORKER SETUP
═══════════════════════════════════════════ */
const WORKER_BODY = `(${makeHighlighters.toString()})`;
const WORKER_SRC = WORKER_BODY + `
var HL = makeHighlighters();
self.onmessage = function(e) {
  var res = (HL[e.data.lang] || HL.javascript)(e.data.code);
  self.postMessage({highlighted: res, id: e.data.id});
};`;

let hlWorker = null;
try {
  const wBlob = new Blob([WORKER_SRC], {type:'application/javascript'});
  const wUrl  = URL.createObjectURL(wBlob);
  hlWorker    = new Worker(wUrl);
  URL.revokeObjectURL(wUrl); // immediate revoke — Worker holds its own internal ref
} catch(e) { /* CSP may block blob workers — fallback to main thread below */ }

// Fallback highlighter for main thread (same engine)
const HL_FALLBACK = makeHighlighters();

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let activeLang   = 'auto';
let rawCode      = '';
let images       = [];    // [{name, blobUrl}]
let matchNodes   = [];
let matchIdx     = 0;
let prevActiveLn = -1;    // FIX: O(1) active line tracking
let _renderId    = 0;     // to discard stale Worker responses

/* ═══════════════════════════════════════════
   UTILS
═══════════════════════════════════════════ */
const $ = id => document.getElementById(id);

function revokeBlob(url) {
  if (url && url.startsWith('blob:')) try { URL.revokeObjectURL(url); } catch(e) {}
}

function toast(msg, dur=2600) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), dur);
}

/* ═══════════════════════════════════════════
   ASYNC HIGHLIGHT — Worker or fallback
═══════════════════════════════════════════ */
function highlightAsync(code, lang, cb) {
  const id = ++_renderId;
  if (hlWorker) {
    const handler = e => {
      if (e.data.id !== id) return;   // stale — discard
      hlWorker.removeEventListener('message', handler);
      cb(e.data.highlighted);
    };
    hlWorker.addEventListener('message', handler);
    hlWorker.postMessage({code, lang, id});
  } else {
    // Fallback: defer one frame so UI stays responsive
    requestAnimationFrame(() => cb((HL_FALLBACK[lang]||HL_FALLBACK.javascript)(code)));
  }
}

function buildCodeDOM(highlighted) {
  return highlighted.split('\n').map(l => `<span class="code-line">${l}</span>`).join('\n');
}

/* ═══════════════════════════════════════════
   RENDER
═══════════════════════════════════════════ */
function render() {
  rawCode = $('code').value;
  if (!rawCode.trim()) { toast('⚠ الرجاء إدخال كود أولاً'); return; }

  const lang  = activeLang === 'auto' ? detect(rawCode) : activeLang;
  const lines = rawCode.split('\n');

  // Stats (instant — no Worker needed)
  $('statLines').textContent = lines.length.toLocaleString();
  $('statChars').textContent = rawCode.length.toLocaleString();
  $('statWords').textContent = rawCode.trim().split(/\s+/).length.toLocaleString();
  $('statLang').textContent  = lang;
  $('langBadge').textContent = lang;
  const ext = EXT[lang] || 'txt';
  $('fileNameDisplay').textContent = `main.${ext}`;
  $('chromeFile').textContent = `main.${ext} — editor`;

  // Line numbers via DocumentFragment (fast, no reflow per node)
  const lnFrag = document.createDocumentFragment();
  lines.forEach((_, i) => {
    const s = document.createElement('span');
    s.className = 'ln'; s.textContent = i + 1;
    lnFrag.appendChild(s);
  });
  $('lineNums').innerHTML = '';
  $('lineNums').appendChild(lnFrag);
  prevActiveLn = -1;

  // Show section with placeholder while Worker runs
  $('codePre').innerHTML = '<span style="color:var(--text-soft)">⟳ جارٍ التلوين...</span>';
  $('outputSection').classList.add('on');

  // Offload heavy regex work to Worker
  highlightAsync(rawCode, lang, highlighted => {
    $('codePre').innerHTML = buildCodeDOM(highlighted);
    setTimeout(() => $('outputSection').scrollIntoView({behavior:'smooth', block:'start'}), 80);
  });

  $('searchInput').value = '';
  $('matchBadge').style.display = 'none';
  matchNodes = []; matchIdx = 0;
}

/* ═══════════════════════════════════════════
   SEARCH — XSS-safe
═══════════════════════════════════════════ */
function runSearch() {
  const q = $('searchInput').value.trim();
  if (!rawCode) return;
  const lang = activeLang === 'auto' ? detect(rawCode) : activeLang;

  $('matchBadge').style.display = 'none';
  matchNodes = []; matchIdx = 0;

  highlightAsync(rawCode, lang, highlighted => {
    if (!q) {
      $('codePre').innerHTML = buildCodeDOM(highlighted);
      return;
    }
    // FIX: escape user query before injecting into HTML (XSS prevention)
    const safeQ = q.replace(/&/g,'&amp;').replace(/\x3c/g,'&lt;').replace(/>/g,'&gt;');
    const safeRe = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    const re     = new RegExp(`(${safeRe})`, 'gi');
    const count  = (rawCode.match(re)||[]).length;
    let idx = 0;
    const withMarks = highlighted.replace(re, () => {
      const cls = idx++ === 0 ? 'hl-match hl-active' : 'hl-match';
      return `<mark class="${cls}">${safeQ}</mark>`;
    });
    $('codePre').innerHTML = buildCodeDOM(withMarks);
    matchNodes = Array.from($('codePre').querySelectorAll('.hl-match'));
    $('matchBadge').textContent = count ? `${count} نتيجة` : 'لا شيء';
    $('matchBadge').style.display = '';
  });
}

function cycleMatch(dir) {
  if (!matchNodes.length) return;
  matchNodes[matchIdx].classList.remove('hl-active');
  matchIdx = (matchIdx + dir + matchNodes.length) % matchNodes.length;
  matchNodes[matchIdx].classList.add('hl-active');
  matchNodes[matchIdx].scrollIntoView({behavior:'smooth', block:'center'});
}

$('searchInput').addEventListener('input', runSearch);
$('prevMatch').addEventListener('click', () => cycleMatch(-1));
$('nextMatch').addEventListener('click', () => cycleMatch(1));

/* ═══════════════════════════════════════════
   COPY / DOWNLOAD
═══════════════════════════════════════════ */
$('copyBtn').addEventListener('click', async () => {
  if (!rawCode) return;
  try {
    await navigator.clipboard.writeText(rawCode);
    $('copyBtn').textContent = '✓ تم النسخ';
    $('copyBtn').classList.add('done');
    setTimeout(() => { $('copyBtn').textContent = '⎘ نسخ'; $('copyBtn').classList.remove('done'); }, 2200);
  } catch { toast('❌ فشل النسخ'); }
});

$('dlBtn').addEventListener('click', () => {
  if (!rawCode) return;
  const lang = activeLang === 'auto' ? detect(rawCode) : activeLang;
  const ext  = EXT[lang] || 'txt';
  const blob = new Blob([rawCode], {type:'text/plain'});
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'), {href:url, download:`code.${ext}`});
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  // FIX: revoke download URL to prevent memory leak
  setTimeout(() => URL.revokeObjectURL(url), 1500);
  toast(`↓ تم تحميل code.${ext}`);
});

/* ═══════════════════════════════════════════
   LANGUAGE PILLS
═══════════════════════════════════════════ */
$('langPills').addEventListener('click', e => {
  const p = e.target.closest('.pill');
  if (!p) return;
  document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
  p.classList.add('active');
  activeLang = p.dataset.lang;
  if (rawCode) render();
});

/* ═══════════════════════════════════════════
   CLEAR
═══════════════════════════════════════════ */
$('clearBtn').addEventListener('click', () => {
  $('code').value = '';
  $('outputSection').classList.remove('on');
  rawCode = ''; prevActiveLn = -1;
  $('chromeFile').textContent = 'untitled — editor';
});

/* ═══════════════════════════════════════════
   RENDER BTN + KEYBOARD
═══════════════════════════════════════════ */
$('renderBtn').addEventListener('click', render);
$('code').addEventListener('keydown', e => {
  if ((e.ctrlKey||e.metaKey) && e.key==='Enter') { e.preventDefault(); render(); }
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = e.target.selectionStart, end = e.target.selectionEnd;
    e.target.value = e.target.value.slice(0,s) + '  ' + e.target.value.slice(end);
    e.target.selectionStart = e.target.selectionEnd = s + 2;
  }
});

/* ═══════════════════════════════════════════
   FILE DROP INTO EDITOR
═══════════════════════════════════════════ */
const codeArea = $('code');
const EXT_MAP  = {
  js:'javascript',ts:'typescript',jsx:'javascript',tsx:'javascript',
  py:'python',html:'html',htm:'html',css:'css',json:'json',
  java:'java',sql:'sql',sh:'shell',bash:'shell',cpp:'cpp',c:'cpp',
  cs:'javascript',rb:'python',go:'javascript',php:'javascript'
};
codeArea.addEventListener('dragover', e => e.preventDefault());
codeArea.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const dl = EXT_MAP[file.name.split('.').pop().toLowerCase()];
  if (dl) {
    activeLang = dl;
    document.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p.dataset.lang===dl));
  }
  const r = new FileReader();
  r.onload = ev => { codeArea.value = ev.target.result; render(); };
  r.readAsText(file);
  $('chromeFile').textContent = `${file.name} — editor`;
  toast(`📄 ${file.name}`);
});

/* ═══════════════════════════════════════════
   EDITOR HELPERS
═══════════════════════════════════════════ */
$('expandBtn').addEventListener('click', () => {
  const ta = $('code');
  ta.style.minHeight = ta.style.minHeight === '70vh' ? '260px' : '70vh';
});
$('formatBtn').addEventListener('click', () => toast('⇥ تنسيق تلقائي قريباً'));

/* ═══════════════════════════════════════════
   IMAGE GALLERY — blob URLs + revokeObjectURL on delete
═══════════════════════════════════════════ */
const zone     = $('imageZone');
const imgInput = $('imgInput');

zone.addEventListener('click', () => imgInput.click());
imgInput.addEventListener('change', e => { handleFiles(Array.from(e.target.files)); imgInput.value=''; });
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
zone.addEventListener('drop', e => {
  e.preventDefault(); zone.classList.remove('dragover');
  const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
  files.length ? handleFiles(files) : toast('⚠ يُرجى إرفاق صور فقط');
});

function handleFiles(files) {
  // FIX: blob URLs are tiny pointers — no base64 bloat, properly revoked on delete
  files.forEach(file => images.push({name: file.name, blobUrl: URL.createObjectURL(file)}));
  renderGallery();
  toast(`🖼 تم إضافة ${files.length} صورة`);
}

function renderGallery() {
  const g = $('gallery');
  g.innerHTML = '';
  images.forEach((img, i) => {
    const card   = document.createElement('div');
    card.className = 'img-card';

    const imgEl  = document.createElement('img');
    imgEl.src    = img.blobUrl;
    imgEl.alt    = img.name;
    imgEl.draggable = false;

    // FIX: use textContent for user-supplied filename — never innerHTML
    const nameEl = document.createElement('span');
    nameEl.className = 'img-name';
    nameEl.textContent = img.name;

    const delBtn = document.createElement('button');
    delBtn.className = 'img-delete';
    delBtn.textContent = '✕';
    delBtn.addEventListener('click', ev => {
      ev.stopPropagation();
      // FIX: revoke blob URL immediately on delete to free browser memory
      revokeBlob(images[i].blobUrl);
      images.splice(i, 1);
      renderGallery();
      toast('🗑 تم حذف الصورة');
    });

    const overlay = document.createElement('div');
    overlay.className = 'img-overlay';
    overlay.appendChild(nameEl);
    overlay.appendChild(delBtn);

    imgEl.addEventListener('click', () => openLightbox(img.blobUrl));
    card.appendChild(imgEl);
    card.appendChild(overlay);
    g.appendChild(card);
  });
}

/* ═══════════════════════════════════════════
   LIGHTBOX
═══════════════════════════════════════════ */
function openLightbox(url) {
  $('lbImg').src = url;
  $('lightbox').classList.add('open');
}
$('lightbox').addEventListener('click', e => {
  if (e.target===$('lightbox')||e.target===$('lbClose')) $('lightbox').classList.remove('open');
});
document.addEventListener('keydown', e => { if(e.key==='Escape') $('lightbox').classList.remove('open'); });

/* ═══════════════════════════════════════════
   PASTE IMAGE FROM CLIPBOARD
═══════════════════════════════════════════ */
document.addEventListener('paste', e => {
  const imgItems = Array.from(e.clipboardData.items).filter(it => it.type.startsWith('image/'));
  if (!imgItems.length) return;
  imgItems.forEach(item => {
    const file = item.getAsFile();
    images.push({name:'clipboard-image.png', blobUrl: URL.createObjectURL(file)});
  });
  renderGallery();
  toast('📋 تم لصق الصورة من الحافظة');
});

/* ═══════════════════════════════════════════
   FIX: ACTIVE LINE — O(1) update
   Old: querySelectorAll('.ln').forEach(...)  → O(n) — freezes on large files
   New: track previous index, update ONLY 2 nodes max
═══════════════════════════════════════════ */
function updateActiveLine() {
  // FIX: slice() replaces deprecated substr()
  const before  = $('code').value.slice(0, $('code').selectionStart);
  const curLine = before.split('\n').length - 1;  // 0-based
  if (curLine === prevActiveLn) return;            // no change — zero DOM work
  const lns = $('lineNums').children;
  if (prevActiveLn >= 0 && lns[prevActiveLn]) lns[prevActiveLn].classList.remove('active-line');
  if (lns[curLine])                            lns[curLine].classList.add('active-line');
  prevActiveLn = curLine;
}
$('code').addEventListener('keyup',  updateActiveLine);
$('code').addEventListener('click',  updateActiveLine);

/* ═══════════════════════════════════════════
   PWA INSTALL PROMPT
═══════════════════════════════════════════ */
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  const btn = document.createElement('button');
  btn.className = 'chip chip-cyan';
  btn.style.cssText = 'cursor:pointer;border:none;font-family:Cairo,sans-serif;';
  btn.textContent = '⊕ تثبيت';
  btn.addEventListener('click', async () => {
    deferredPrompt.prompt();
    const {outcome} = await deferredPrompt.userChoice;
    if (outcome==='accepted') toast('✦ تم تثبيت CodeVault!', 3500);
    btn.remove(); deferredPrompt = null;
  });
  document.querySelector('.nav-chips').prepend(btn);
});
window.addEventListener('appinstalled', () => toast('✦ CodeVault مثبّت على جهازك!', 3500));

</script>
</body>
</html>
